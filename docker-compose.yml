version: '3'

services:
  mphirs_php:
    build:
      context: .
      dockerfile: Dockerfile
    image: mphirs-app
    container_name: mphirs-php-container
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
    networks:
      - mphirs-network
      - laravel-network

  mphirs_nginx:
    image: nginx:alpine
    container_name: mphirs-nginx-container
    restart: unless-stopped
    ports:
      - "8090:80"
    volumes:
      - .:/var/www
      - ./nginx/conf.d:/etc/nginx/conf.d
    networks:
      - mphirs-network
    depends_on:
      - mphirs_php

networks:
  mphirs-network:
    driver: bridge

  laravel-network:
    external: true
    name: bpbd_laravel-network
