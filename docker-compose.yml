version: '3'

services:
  mphris_php:
    build:
      context: .
      dockerfile: Dockerfile
    image: mphris-app
    container_name: mphris-php-container
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
    networks:
      - mphris-network
      - laravel-network

  mphris_nginx:
    image: nginx:alpine
    container_name: mphris-nginx-container
    restart: unless-stopped
    ports:
      - "8090:80"
    volumes:
      - .:/var/www
      - ./nginx/conf.d:/etc/nginx/conf.d
    networks:
      - mphris-network
    depends_on:
      - mphris_php

networks:
  mphris-network:
    driver: bridge

  laravel-network:
    external: true
    name: bpbd_laravel-network
